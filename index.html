<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Productivity Tracker</title>
<style>
*{
  box-sizing: border-box;
}

body{
  font-family: Arial, sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0f172a,#1e1b4b,#111827);
  color:#f8fafc;
  min-height:100vh;
}

/* HEADER */
header{
  background: linear-gradient(90deg,#7c3aed,#ec4899,#f97316);
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  box-shadow:0 4px 18px rgba(0,0,0,.35);
}

/* NAV */
nav{
  display:flex;
  justify-content:center;
  gap:12px;
  padding:14px;
  background:rgba(255,255,255,.06);
  backdrop-filter: blur(10px);
}

nav button{
  width:auto;
  padding:10px 18px;
  border:none;
  border-radius:999px;
  background:linear-gradient(90deg,#06b6d4,#3b82f6);
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:.25s;
}

nav button:hover{
  transform:translateY(-2px) scale(1.05);
}

/* CONTAINER */
.container{
  padding:20px;
  max-width:900px;
  margin:auto;
}

/* CARD (GLASS EFFECT) */
.card{
  background:rgba(255,255,255,.08);
  padding:20px;
  margin:15px 0;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 12px 30px rgba(0,0,0,.25);
  backdrop-filter: blur(12px);
}

/* INPUTS */
input{
  margin:6px 0;
  padding:12px;
  width:100%;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,.12);
  color:white;
  outline:none;
}

input::placeholder{
  color:#cbd5e1;
}

/* BUTTONS */
button{
  margin:6px 0;
  padding:12px;
  width:100%;
  border-radius:10px;
  border:none;
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
  font-weight:700;
  color:white;
  cursor:pointer;
  transition:.25s;
}

button:hover{
  transform:translateY(-2px);
  filter:brightness(1.1);
}

/* TIMER */
#timer{
  font-size:34px;
  text-align:center;
  color:#22d3ee;
  font-weight:800;
  margin:15px 0;
  text-shadow:0 0 12px rgba(34,211,238,.6);
}

/* TASK LIST */
li{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin:8px 0;
  padding:10px;
  background:rgba(255,255,255,.06);
  border-radius:10px;
}

.completed{
  text-decoration: line-through;
  color:#94a3b8;
}

/* PROGRESS BAR */
.progress-bar{
  background:rgba(255,255,255,.08);
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
  height:12px;
}

.progress{
  height:12px;
  background:linear-gradient(90deg,#22c55e,#06b6d4,#3b82f6);
  width:0%;
  transition:.3s;
}

/* HEADINGS */
h3,h4{
  color:#f0abfc;
}

/* QUOTE */
#quote{
  margin-top:10px;
  font-style:italic;
  color:#fde68a;
  background:rgba(255,255,255,.05);
  padding:10px;
  border-radius:12px;
}

/* HIDDEN */
.hidden{
  display:none;
}
</style>
</head>
<body>

<header><h2>Study Productivity Tracker</h2></header>

<nav>
<button onclick="showSection('productivity')">Productivity</button>
<button onclick="showSection('gpa')">GPA</button>
</nav>

<div class="container">

<!-- PRODUCTIVITY -->
<div id="productivity" class="card">
<h3>Tasks</h3>
<input id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add Task</button>
<ul id="taskList"></ul>

<h4>Completed Today</h4>
<button onclick="resetTasks()">Reset Tasks</button>
<ul id="completedList"></ul>

<h3>Pomodoro Timer</h3>
<input id="pomodoroTime" placeholder="Enter minutes (e.g 25)">
<p id="timer">00:00</p>

<button onclick="startPomodoro()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>

<h4>Progress</h4>
<div class="progress-bar"><div id="progress" class="progress"></div></div>
</div>

<!-- GPA -->
<div id="gpa" class="card hidden">
<h3>GPA Calculator</h3>
<input id="ut1" placeholder="UT1 (10)">
<input id="ut2" placeholder="UT2 (10)">
<input id="practical" placeholder="Practical (15)">
<input id="lab" placeholder="Lab (10)">
<input id="term" placeholder="Term End (100)">
<button onclick="calculateGPA()">Calculate</button>
<p id="grade"></p>
<p id="gpaRes"></p>

<h3>Target GPA</h3>
<input id="targetGPA" placeholder="Enter target (6-10)">
<button onclick="analyzeGoal()">Analyze</button>
<p id="suggestion"></p>

<h3>Motivation</h3>
<p id="quote"></p>
<button onclick="newQuote()">New Quote</button>
</div>

</div>

<script>

// SECTION SWITCH
function showSection(id){
 document.querySelectorAll('.card').forEach(el=>el.classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
}

// TASKS
function addTask(){
 let task=taskInput.value;
 let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
 tasks.push({text:task,done:false,date:new Date().toDateString()});
 localStorage.setItem("tasks",JSON.stringify(tasks));
 loadTasks();
}

function toggleTask(i){
 let tasks=JSON.parse(localStorage.getItem("tasks"));
 tasks[i].done=!tasks[i].done;
 localStorage.setItem("tasks",JSON.stringify(tasks));
 loadTasks();
}

function loadTasks(){
 let list=taskList; let comp=completedList;
 list.innerHTML=""; comp.innerHTML="";
 let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
 let today=new Date().toDateString();

 tasks.forEach((t,i)=>{
  let li=document.createElement("li");
  li.innerHTML=`<span class='${t.done?"completed":""}'>${t.text}</span>
  <input type='checkbox' ${t.done?"checked":""} onclick='toggleTask(${i})'>`;

  if(t.done && t.date===today) comp.appendChild(li);
  else if(!t.done) list.appendChild(li);
 });
}

// RESET TASKS
function resetTasks(){
 localStorage.removeItem("tasks");
 loadTasks();
}

// POMODORO TIMER
let time=0;
let timerInterval=null;

function startPomodoro(){
 let minutes=Number(document.getElementById("pomodoroTime").value);

 if(!minutes || minutes<=0){
  alert("Enter valid time");
  return;
 }

 time=minutes*60;

 if(timerInterval) return;

 timerInterval=setInterval(()=>{
  time--;

  let m=Math.floor(time/60);
  let s=time%60;

  timer.innerHTML=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;

  let total=minutes*60;
  let progress=((total-time)/total)*100;
  document.getElementById("progress").style.width=progress+"%";

  if(time<=0){
   clearInterval(timerInterval);
   timerInterval=null;
   alert("Time's up! Take a break ☕");
  }

 },1000);
}

function stopTimer(){
 clearInterval(timerInterval);
 timerInterval=null;
}

function resetTimer(){
 stopTimer();
 time=0;
 timer.innerHTML="00:00";
 document.getElementById("progress").style.width="0%";
}

// GPA
function calculateGPA(){
 let ut1Val = Number(document.getElementById("ut1").value);
 let ut2Val = Number(document.getElementById("ut2").value);
 let practicalVal = Number(document.getElementById("practical").value);
 let labVal = Number(document.getElementById("lab").value);
 let termVal = Number(document.getElementById("term").value);

 if(ut1Val>10||ut2Val>10||practicalVal>15||labVal>10||termVal>100){
  alert("Invalid marks"); 
  return;
 }

 let totalICA = ut1Val + ut2Val + practicalVal + labVal + 5;
 let totalMarks = totalICA + (termVal/2);

 let grade = ""; 
 let credit = 0;

 if(totalMarks > 90){ grade="O"; credit=10; }
 else if(totalMarks > 80){ grade="A+"; credit=9; }
 else if(totalMarks >=70){ grade="A"; credit=8; }
 else if(totalMarks >=60){ grade="B"; credit=7; }
 else if(totalMarks >=50){ grade="C"; credit=6; }
 else { grade="F"; }

 document.getElementById("grade").innerHTML = "Grade: " + grade;

 if(grade === "F"){
   document.getElementById("gpaRes").innerHTML = "GPA not calculated";
 } else {
   document.getElementById("gpaRes").innerHTML = "GPA: " + credit;
 }

 localStorage.setItem("currentGPA", credit);
}

// GOAL
function analyzeGoal(){
 let target=Number(targetGPA.value);
 let current=Number(localStorage.getItem("currentGPA")||0);

 let msg="";

 if(target>10||target<6) msg="Enter valid GPA";
 else if(target<=current) msg="Already achieved 🔥";
 else if(target-current<=1) msg="Very achievable 💪";
 else if(target-current<=2) msg="Needs effort 📚";
 else msg="Challenging 🚀";

 suggestion.innerHTML=msg;
}

// QUOTES
let quotes=[
"Stay consistent!",
"Discipline beats motivation.",
"Small progress daily.",
"Focus on your goals.",
"Push yourself!"
];

function newQuote(){
 quote.innerHTML=quotes[Math.floor(Math.random()*quotes.length)];
}

// INIT
newQuote();
loadTasks();

</script>

</body>
</html>
